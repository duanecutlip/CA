name = "morning-digest"
main = "src/index.js"
compatibility_date = "2024-01-01"
workers_dev = true

[triggers]
# 12:00 UTC = 7:00 AM EST (Nov-Mar)
# Change to 11:00 UTC = 7:00 AM EDT (Mar-Nov)
crons = ["0 12 * * *"]

[vars]
TO_EMAIL = "duanecutlip@gmail.com"
FROM_EMAIL = "digest@duanecutlip.com"
HUBSPOT_PORTAL_ID = "1250503"
WORKER_BASE_URL = "https://morning-digest.duanecutlip.workers.dev"

# Add these secrets via CLI (do NOT put real values here):
# wrangler secret put HUBSPOT_TOKEN
# wrangler secret put RESEND_API_KEY
